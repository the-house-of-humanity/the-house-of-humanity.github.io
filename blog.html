<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blogs | House of Humanity</title>
    <meta name="description" content="Thoughts, insights, and reflections on technology and humanity.">
    
    <!-- Font Awesome (from source) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* ========== SOURCE AESTHETICS (exact copy) ========== */
        :root {
            --accent: #e67e22;
            --reading-bg: #faf8f5;
            --reading-text: #333;
            --reading-width: 720px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ---------- Homepage (post list) ---------- */
        .home-content {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .home-content h1 {
            font-size: 2.2rem;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .tagline {
            color: #999;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        /* ---------- Post Cards ---------- */
        .post-card {
            background: #fff;
            padding: 28px 32px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            transition: box-shadow 0.2s, transform 0.2s;
            cursor: pointer;
            display: block;
            text-decoration: none;
            color: inherit;
        }

        .post-card:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }

        .post-card h2 {
            font-size: 1.3rem;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        .post-card .post-date {
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 10px;
        }

        .post-card p {
            color: #666;
            line-height: 1.6;
        }

        /* ---------- Reading Mode ---------- */
        body.reading-mode {
            background: var(--reading-bg);
        }

        .reading-content {
            max-width: var(--reading-width);
            margin: 0 auto;
            padding: 60px 40px;
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 18px;
            line-height: 1.85;
            color: var(--reading-text);
        }

        .reading-content h1 {
            font-size: 2rem;
            color: var(--reading-text);
            margin-bottom: 8px;
        }

        .reading-content .post-date {
            font-size: 0.9rem;
            color: #999;
            margin-bottom: 32px;
        }

        .reading-content h2 {
            font-size: 1.4rem;
            color: var(--reading-text);
            margin-top: 36px;
            margin-bottom: 8px;
        }

        .reading-content h3 {
            font-size: 1.15rem;
            color: var(--reading-text);
            margin-top: 28px;
        }

        .reading-content p {
            color: var(--reading-text);
            margin-bottom: 18px;
        }

        .reading-content ul, .reading-content ol {
            margin-left: 24px;
            margin-bottom: 18px;
        }

        .reading-content li {
            margin-bottom: 6px;
        }

        .reading-content blockquote {
            border-left: 4px solid var(--accent);
            margin: 24px 0;
            padding: 12px 20px;
            font-style: italic;
            color: #555;
        }

        .reading-content code {
            background: #eee;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.9em;
        }

        /* ---------- Back Button ---------- */
        .back-btn {
            display: inline-block;
            margin-bottom: 24px;
            padding: 6px 16px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            color: #555;
            cursor: pointer;
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 0.9rem;
            text-decoration: none;
            transition: all 0.2s;
        }

        .back-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: #fff;
        }

        /* ---------- Floating Home Button (source style) ---------- */
        .home-fab {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1001;
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid #e0e0e0;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 18px rgba(0,0,0,0.12);
            transition: all 0.3s ease;
            color: #555;
            text-decoration: none;
        }

        .home-fab:hover {
            box-shadow: 0 6px 24px rgba(0,0,0,0.18);
            border-color: var(--accent);
            color: var(--accent);
            transform: scale(1.08);
        }

        /* ---------- View toggling ---------- */
        #postListView { display: block; }
        #readingView { display: none; }

        /* ---------- Responsive ---------- */
        @media (max-width: 600px) {
            .home-content {
                padding: 40px 20px;
            }
            .reading-content {
                padding: 40px 20px;
                font-size: 16px;
            }
            .post-card {
                padding: 20px 24px;
            }
            .home-fab {
                bottom: 20px;
                right: 16px;
                width: 46px;
                height: 46px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ========== POST LIST (Homepage) ========== -->
    <div id="postListView">
        <main class="home-content">
            <h1>Worklog (*and*) Shithog</h1>
            <p class="tagline">I am a writer so do I</p>
            <div id="postsContainer">
                <!-- JavaScript fills this -->
            </div>
        </main>
    </div>

    <!-- ========== READING VIEW (hidden) ========== -->
    <div id="readingView">
        <main class="reading-content">
            <button class="back-btn" id="backToList"><i class="fas fa-arrow-left"></i> Back to posts</button>
            <div id="postDetailContent">
                <!-- JavaScript fills this -->
            </div>
        </main>
    </div>

    <!-- ========== FLOATING HOME BUTTON ========== -->
    <a href="index.html" class="home-fab" title="Back to House of Humanity">
        <i class="fas fa-home"></i>
    </a>

    <script>
        (function() {
            const postListView = document.getElementById('postListView');
            const readingView = document.getElementById('readingView');
            const postsContainer = document.getElementById('postsContainer');
            const postDetailContent = document.getElementById('postDetailContent');
            const backBtn = document.getElementById('backToList');

            let allPosts = [];

            // ---------- Load posts from blogs.json ----------
            async function loadPosts() {
                try {
                    const response = await fetch('blogs.json');
                    if (!response.ok) throw new Error('Failed to load blogs.json');
                    const data = await response.json();
                    // data should be an array of post objects
                    allPosts = Array.isArray(data) ? data : [];
                } catch (error) {
                    console.error('Could not load posts:', error);
                    allPosts = [];
                }
                renderPostList();
            }

            function renderPostList() {
                if (!postsContainer) return;
                if (allPosts.length === 0) {
                    postsContainer.innerHTML = '<p style="text-align:center; color:#999;">No posts yet. Add some entries to <code>blogs.json</code>.</p>';
                    return;
                }

                // Sort newest first
                const sorted = [...allPosts].sort((a, b) => new Date(b.date) - new Date(a.date));

                postsContainer.innerHTML = sorted.map(post => `
                    <div class="post-card" data-post-id="${post.id}">
                        <h2>${escapeHtml(post.title)}</h2>
                        <p class="post-date"><i class="far fa-calendar"></i> ${formatDate(post.date)}</p>
                        <p>${escapeHtml(post.excerpt || '')}</p>
                    </div>
                `).join('');

                // Click event on each card
                document.querySelectorAll('.post-card').forEach(card => {
                    card.addEventListener('click', function() {
                        const id = this.dataset.postId;
                        openPost(id);
                    });
                });
            }

            function openPost(id) {
                const post = allPosts.find(p => p.id == id);
                if (!post) return;

                // Build the reading view content
                let contentHtml = '';
                if (post.content) {
                    // If content is plain text with line breaks, convert to paragraphs
                    contentHtml = simpleMarkdownToHtml(post.content);
                } else {
                    contentHtml = '<p>No content available.</p>';
                }

                postDetailContent.innerHTML = `
                    <h1>${escapeHtml(post.title)}</h1>
                    <p class="post-date"><i class="far fa-calendar"></i> ${formatDate(post.date)}</p>
                    ${contentHtml}
                `;

                // Switch to reading view
                postListView.style.display = 'none';
                readingView.style.display = 'block';
                document.body.classList.add('reading-mode');
                window.scrollTo(0, 0);
            }

            function goBackToList() {
                readingView.style.display = 'none';
                postListView.style.display = 'block';
                document.body.classList.remove('reading-mode');
                window.scrollTo(0, 0);
            }

            // ---------- Utilities ----------
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function formatDate(dateString) {
                if (!dateString) return '';
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                return new Date(dateString).toLocaleDateString('en-US', options);
            }

            // Very basic markdown → HTML (handles headings, bold, italic, lists, links, blockquotes)
            function simpleMarkdownToHtml(md) {
                if (!md) return '';
                const lines = md.split('\n');
                let html = '';
                let inList = false;

                for (let line of lines) {
                    const trimmed = line.trim();
                    if (trimmed === '') {
                        if (inList) {
                            html += '</ul>';
                            inList = false;
                        }
                        continue;
                    }

                    // Headings
                    if (trimmed.startsWith('### ')) {
                        html += `<h3>${applyInline(trimmed.substring(4))}</h3>`;
                        continue;
                    }
                    if (trimmed.startsWith('## ')) {
                        html += `<h2>${applyInline(trimmed.substring(3))}</h2>`;
                        continue;
                    }
                    if (trimmed.startsWith('# ')) {
                        html += `<h1>${applyInline(trimmed.substring(2))}</h1>`;
                        continue;
                    }

                    // Blockquote
                    if (trimmed.startsWith('> ')) {
                        html += `<blockquote>${applyInline(trimmed.substring(2))}</blockquote>`;
                        continue;
                    }

                    // Unordered list
                    if (trimmed.startsWith('- ') || trimmed.startsWith('* ')) {
                        if (!inList) {
                            html += '<ul>';
                            inList = true;
                        }
                        html += `<li>${applyInline(trimmed.substring(2))}</li>`;
                        continue;
                    }

                    // Ordered list (1. )
                    const orderedMatch = trimmed.match(/^\d+\.\s(.+)/);
                    if (orderedMatch) {
                        if (!inList) {
                            html += '<ol>';
                            inList = true;
                        }
                        html += `<li>${applyInline(orderedMatch[1])}</li>`;
                        continue;
                    }

                    // If we were in a list and now we're not, close it
                    if (inList) {
                        html += '</ul>';
                        inList = false;
                    }

                    // Regular paragraph
                    html += `<p>${applyInline(trimmed)}</p>`;
                }

                if (inList) {
                    html += '</ul>';
                }

                return html;
            }

            function applyInline(text) {
                let escaped = escapeHtml(text);
                // Bold **text**
                escaped = escaped.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
                // Italic *text*
                escaped = escaped.replace(/\*(.+?)\*/g, '<em>$1</em>');
                // Inline code `text`
                escaped = escaped.replace(/`(.+?)`/g, '<code>$1</code>');
                // Links [text](url)
                escaped = escaped.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
                return escaped;
            }

            // ---------- Event Listeners ----------
            backBtn.addEventListener('click', goBackToList);

            // ---------- Start ----------
            loadPosts();
        })();
    </script>
</body>
</html>
