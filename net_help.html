<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Net Help | House of Humanity</title>
    <meta name="description" content="Literature Reference System - Explore works, authors, concepts, and historical events.">
    <link rel="stylesheet" href="net_help.css">
</head>
<body>
    <!-- Floating Home Button -->
    <a href="index.html" class="floating-home" title="Return to House of Humanity" aria-label="Return to Home Page">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
    </a>

    <!-- Header -->
    <header id="app-header">
        <h1 id="app-title">📚 LitRef</h1>
    </header>

    <!-- Side Navigation Panel -->
    <nav id="side-panel">
        <button class="nav-btn active" data-view="home">🏠 Home</button>
        <button class="nav-btn" data-view="works">📖 Works</button>
        <button class="nav-btn" data-view="authors">✍️ Authors</button>
        <button class="nav-btn" data-view="concepts">💡 Concepts</button>
        <button class="nav-btn" data-view="history">📜 History</button>
    </nav>

    <!-- Main Content -->
    <main>
        <!-- Home View -->
        <section id="view-home" class="view active">
            <div class="search-bar">
                <input type="text" id="home-search" placeholder="Search works by title, description, year, country, author...">
            </div>
            <div id="home-content"></div>
        </section>

        <!-- Works View -->
        <section id="view-works" class="view">
            <div class="search-bar">
                <input type="text" id="works-search" placeholder="Search works...">
            </div>
            <div id="works-content"></div>
        </section>

        <!-- Authors View -->
        <section id="view-authors" class="view">
            <div class="search-bar">
                <input type="text" id="authors-search" placeholder="Search authors...">
            </div>
            <div id="authors-content"></div>
        </section>

        <!-- Author Detail View -->
        <section id="view-author-detail" class="view">
            <div id="author-detail-content"></div>
        </section>

        <!-- Concepts View -->
        <section id="view-concepts" class="view">
            <div class="search-bar">
                <input type="text" id="concepts-search" placeholder="Search concepts...">
            </div>
            <div id="concepts-content"></div>
        </section>

        <!-- Concept Detail View -->
        <section id="view-concept-detail" class="view">
            <div id="concept-detail-content"></div>
        </section>

        <!-- History View -->
        <section id="view-history" class="view">
            <div class="search-bar">
                <input type="text" id="history-search" placeholder="Search historical events...">
            </div>
            <div id="history-content"></div>
        </section>

        <!-- History Detail View -->
        <section id="view-history-detail" class="view">
            <div id="history-detail-content"></div>
        </section>

        <!-- Work Detail View -->
        <section id="view-work" class="view">
            <div id="work-detail-content"></div>
        </section>
    </main>

    <script src="net_help.js"></script>
</body>
</html>
